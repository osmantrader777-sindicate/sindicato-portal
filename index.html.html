<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sindicato Juan Flores Vivas CIPS-MINSA</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
h1,h2,h3 { color:#003366; }
section { padding:20px; max-width:1000px; margin:auto; background:#fff; margin-bottom:20px; border-radius:10px; }
nav ul { list-style:none; margin:0; padding:0; display:flex; flex-wrap:wrap; background:#003366; }
nav a { color:#fff; padding:12px; display:block; text-decoration:none; }
nav a:hover { background:#0055aa; }
.summary { display:flex; justify-content:space-around; margin-top:15px; flex-wrap:wrap; }
.summary div { background:#e6f0ff; padding:15px; border-radius:10px; width:45%; margin:5px; text-align:center; }
#chart_div { height:300px; }
table { width:100%; font-size:12px; }
</style>
</head>

<body>

<h1 style="text-align:center;">Sindicato Juan Flores Vivas</h1>

<section>
<h2>Dashboard</h2>

<div class="summary" id="totals"></div>
<div id="chart_div"></div>
<div id="tables"></div>

<button id="downloadPdf">Descargar PDF</button>

</section>

<section>
<h2>Archivo completo</h2>
<iframe src="https://docs.google.com/spreadsheets/d/1N1UuKS1czEdaGZdkCIX9TGPMw1QJP4on/preview" width="100%" height="400"></iframe>
</section>

<script>

google.charts.load('current', {'packages':['table','corechart']});

const sheets = {
  "Ingresos": { id: "1N1UuKS1czEdaGZdkCIX9TGPMw1QJP4on", sheet: "INGRESOS" },
  "Egresos": { id: "1N1UuKS1czEdaGZdkCIX9TGPMw1QJP4on", sheet: "EGRESOS" },
  "CxC1": { id: "1N1UuKS1czEdaGZdkCIX9TGPMw1QJP4on", sheet: "CxC Bar de comida #1" },
  "CxC2": { id: "1N1UuKS1czEdaGZdkCIX9TGPMw1QJP4on", sheet: "CxC Bar de comida #2" }
};

function querySheet(sheetInfo, callback){
  const query = new google.visualization.Query(
    `https://docs.google.com/spreadsheets/d/${sheetInfo.id}/gviz/tq?sheet=${encodeURIComponent(sheetInfo.sheet)}&headers=1`
  );
  query.send(response=>{
    if(response.isError()) callback(null);
    else callback(response.getDataTable());
  });
}

function loadAll(){
  google.charts.setOnLoadCallback(()=>{
    let dataObjects={}; let loaded=0;

    Object.keys(sheets).forEach(k=>{
      querySheet(sheets[k],data=>{
        dataObjects[k]=data;
        loaded++;
        if(loaded===Object.keys(sheets).length){
          render(dataObjects);
        }
      });
    });

  });
}

function render(dataObjects){
  let totalIngresos=0;
  let totalEgresos=0;

  if(dataObjects["Ingresos"]){
    for(let i=0;i<dataObjects["Ingresos"].getNumberOfRows();i++){
      totalIngresos += parseFloat(dataObjects["Ingresos"].getValue(i,1));
    }
  }

  if(dataObjects["Egresos"]){
    for(let i=0;i<dataObjects["Egresos"].getNumberOfRows();i++){
      totalEgresos += parseFloat(dataObjects["Egresos"].getValue(i,1));
    }
  }

  document.getElementById("totals").innerHTML = `
    <div><h3>Ingresos</h3><p>$${totalIngresos.toFixed(2)}</p></div>
    <div><h3>Egresos</h3><p>$${totalEgresos.toFixed(2)}</p></div>
    <div><h3>Diferencia</h3><p>$${(totalIngresos-totalEgresos).toFixed(2)}</p></div>
  `;

  const chartData = google.visualization.arrayToDataTable([
    ['Tipo','Monto'],
    ['Ingresos',totalIngresos],
    ['Egresos',totalEgresos]
  ]);

  const chart = new google.visualization.ColumnChart(document.getElementById('chart_div'));
  chart.draw(chartData);

  const tablesDiv = document.getElementById("tables");
  tablesDiv.innerHTML="";

  Object.keys(dataObjects).forEach(k=>{
    if(dataObjects[k]){
      let title=document.createElement("h3");
      title.innerText=k;
      tablesDiv.appendChild(title);

      let tableDiv=document.createElement("div");
      tablesDiv.appendChild(tableDiv);

      let table=new google.visualization.Table(tableDiv);
      table.draw(dataObjects[k],{width:'100%'});
    }
  });
}

document.getElementById("downloadPdf").addEventListener("click",()=>{
  const { jsPDF } = window.jspdf;
  html2canvas(document.body).then(canvas=>{
    const img=canvas.toDataURL("image/png");
    const pdf=new jsPDF();
    pdf.addImage(img,'PNG',0,0);
    pdf.save("reporte.pdf");
  });
});

loadAll();

</script>

</body>
</html>
