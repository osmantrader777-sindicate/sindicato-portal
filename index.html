<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sindicato Juan Flores Vivas</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
section{padding:20px;max-width:1000px;margin:auto;background:#fff;margin-top:20px;border-radius:10px;}
h1{text-align:center;}
.summary{display:flex;justify-content:space-around;flex-wrap:wrap;}
.summary div{background:#e6f0ff;padding:15px;border-radius:10px;width:45%;margin:5px;text-align:center;}
</style>
</head>

<body>

<h1>Sindicato Juan Flores Vivas</h1>

<section>

<div class="summary" id="totals"></div>
<div id="chart_div" style="height:300px;"></div>
<div id="tables"></div>

<button onclick="descargarPDF()">Descargar PDF</button>

</section>

<section>
<h3>Archivo completo</h3>
<iframe src="https://docs.google.com/spreadsheets/d/1N1UuKS1czEdaGZdkCIX9TGPMw1QJP4on/preview" width="100%" height="400"></iframe>
</section>

<script>

google.charts.load('current', {'packages':['table','corechart']});

const ID = "1N1UuKS1czEdaGZdkCIX9TGPMw1QJP4on";

function convertirNumero(valor){
  if(typeof valor === "number") return valor;
  if(typeof valor === "string"){
    return parseFloat(
      valor.replace(/\./g,"")
           .replace(",",".")
           .replace(/[^\d.-]/g,"")
    ) || 0;
  }
  return 0;
}

function query(sheet, callback){
  const url = `https://docs.google.com/spreadsheets/d/${ID}/gviz/tq?sheet=${encodeURIComponent(sheet)}`;
  const q = new google.visualization.Query(url);
  q.send(res=>{
    if(res.isError()) callback(null);
    else callback(res.getDataTable());
  });
}

function cargar(){
  google.charts.setOnLoadCallback(()=>{
    
    query("INGRESOS", ingresos=>{
      query("EGRESOS", egresos=>{
        render(ingresos, egresos);
      });
    });

  });
}

function render(ingresos, egresos){

  let totalIngresos=0;
  let totalEgresos=0;

  if(ingresos){
    for(let i=0;i<ingresos.getNumberOfRows();i++){
      totalIngresos += convertirNumero(ingresos.getValue(i,1));
    }
  }

  if(egresos){
    for(let i=0;i<egresos.getNumberOfRows();i++){
      totalEgresos += convertirNumero(egresos.getValue(i,1));
    }
  }

  document.getElementById("totals").innerHTML = `
    <div><h3>Ingresos</h3><p>$${totalIngresos.toFixed(2)}</p></div>
    <div><h3>Egresos</h3><p>$${totalEgresos.toFixed(2)}</p></div>
    <div><h3>Diferencia</h3><p>$${(totalIngresos-totalEgresos).toFixed(2)}</p></div>
  `;

  const data = google.visualization.arrayToDataTable([
    ['Tipo','Monto'],
    ['Ingresos',totalIngresos],
    ['Egresos',totalEgresos]
  ]);

  const chart = new google.visualization.ColumnChart(document.getElementById('chart_div'));
  chart.draw(data);

  const tables = document.getElementById("tables");
  tables.innerHTML="";

  if(ingresos){
    let div=document.createElement("div");
    tables.appendChild(document.createElement("h3")).innerText="Ingresos";
    tables.appendChild(div);
    new google.visualization.Table(div).draw(ingresos);
  }

  if(egresos){
    let div=document.createElement("div");
    tables.appendChild(document.createElement("h3")).innerText="Egresos";
    tables.appendChild(div);
    new google.visualization.Table(div).draw(egresos);
  }
}

function descargarPDF(){
  const { jsPDF } = window.jspdf;
  html2canvas(document.body).then(canvas=>{
    const img=canvas.toDataURL("image/png");
    const pdf=new jsPDF();
    pdf.addImage(img,'PNG',0,0);
    pdf.save("reporte.pdf");
  });
}

cargar();

</script>

</body>
</html>
