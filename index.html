<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sindicato Juan Flores Vivas</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
h1 { text-align:center; padding:20px; color:#003366; }

section {
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.summary {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.card {
  flex:1;
  background:#e6f0ff;
  padding:15px;
  border-radius:10px;
  text-align:center;
  min-width:250px;
}

#chart_div { height:250px; margin-top:20px; }
iframe { border:none; border-radius:10px; }
</style>
</head>

<body>

<h1>Sindicato Juan Flores Vivas</h1>

<section>

<div class="summary">
  <div class="card"><h3>Ingresos</h3><p id="ingresos">C$ 0</p></div>
  <div class="card"><h3>Egresos</h3><p id="egresos">C$ 0</p></div>
  <div class="card"><h3>Diferencia</h3><p id="diferencia">C$ 0</p></div>
</div>

<div id="chart_div"></div>

</section>

<section>
<h3>Archivo completo</h3>
<iframe 
  src="https://docs.google.com/spreadsheets/d/1N1UuKS1czEdaGZdkCIX9TGPMw1QJP4on/preview" 
  width="100%" 
  height="400">
</iframe>
</section>

<script>

google.charts.load('current', {'packages':['corechart']});

const SHEET_ID = "1N1UuKS1czEdaGZdkCIX9TGPMw1QJP4on";

function query(sheet, callback){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheet)}&headers=1`;
  const q = new google.visualization.Query(url);
  q.send(res=>{
    if(res.isError()) {
      console.error("Error en hoja:", sheet);
      callback(null);
    } else {
      callback(res.getDataTable());
    }
  });
}

function sumData(data){
  let total = 0;
  for(let i=0;i<data.getNumberOfRows();i++){
    let valor = data.getValue(i,1);

    // Limpia valores tipo "C$ 3,000"
    if(typeof valor === "string"){
      valor = valor.replace(/[^\d.-]/g, "");
    }

    let monto = parseFloat(valor) || 0;
    total += monto;
  }
  return total;
}

function load(){

  google.charts.setOnLoadCallback(()=>{

    query("INGRESOS", ingresosData=>{
      query("EGRESOS", egresosData=>{

        let ingresos = ingresosData ? sumData(ingresosData) : 0;
        let egresos = egresosData ? sumData(egresosData) : 0;
        let diferencia = ingresos - egresos;

        document.getElementById("ingresos").innerText = `C$ ${ingresos.toFixed(2)}`;
        document.getElementById("egresos").innerText = `C$ ${egresos.toFixed(2)}`;
        document.getElementById("diferencia").innerText = `C$ ${diferencia.toFixed(2)}`;

        const chartData = google.visualization.arrayToDataTable([
          ['Tipo','Monto'],
          ['Ingresos', ingresos],
          ['Egresos', egresos]
        ]);

        const chart = new google.visualization.ColumnChart(document.getElementById('chart_div'));
        chart.draw(chartData, {
          title: "Ingresos vs Egresos",
          legend: { position: "none" }
        });

      });
    });

  });

}

load();

</script>

</body>
</html>
