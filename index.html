<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sindicato Juan Flores Vivas</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:20px}
h1{text-align:center;color:#003366}
section{max-width:1000px;margin:auto;background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
.summary{display:flex;gap:10px;flex-wrap:wrap}
.card{flex:1;min-width:220px;background:#e6f0ff;padding:15px;border-radius:10px;text-align:center}
#chart_div{height:350px}
.controls{display:flex;gap:10px;margin-bottom:15px}
select,button{padding:10px}
button{background:#003366;color:#fff;border:none;border-radius:6px;cursor:pointer}
iframe{border:none;border-radius:10px}
</style>
</head>
<body>

<div id="reportePDF">
<h1>Sindicato Juan Flores Vivas</h1>

<section>
<div class="controls">
<select id="mesSelector"></select>
<button onclick="descargarPDF()">📄 Descargar Reporte PDF</button>
</div>

<div class="summary">
<div class="card"><h3>Ingresos</h3><p id="ingresos">C$ 0.00</p></div>
<div class="card"><h3>Egresos</h3><p id="egresos">C$ 0.00</p></div>
<div class="card"><h3>Diferencia</h3><p id="diferencia">C$ 0.00</p></div>
</div>

<div id="chart_div"></div>
</section>
</div>

<section>
<h3>Archivo completo</h3>
<iframe src="https://docs.google.com/spreadsheets/d/1g8g4YVEk1mZ8IF86sLmqfoXYBDQjsTHe/preview" width="100%" height="450"></iframe>
</section>

<script>
google.charts.load('current', {'packages':['corechart']});

const SHEET_ID="1g8g4YVEk1mZ8IF86sLmqfoXYBDQjsTHe";
const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function limpiarNumero(valor){
 if(typeof valor==="string"){valor=valor.replace(/[^\d.-]/g,"");}
 return parseFloat(valor)||0;
}

function query(sheet,callback){
 const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheet)}&headers=1`;
 const q=new google.visualization.Query(url);
 q.send(res=>{
   if(res.isError()){callback(null);}
   else{callback(res.getDataTable());}
 });
}

function calcularPorMes(data,mesIndex,year){
 let total=0;
 for(let i=0;i<data.getNumberOfRows();i++){
   let fecha=new Date(data.getValue(i,0));
   let monto=limpiarNumero(data.getValue(i,3));
   if(fecha instanceof Date && !isNaN(fecha)){
      if(fecha.getMonth()===mesIndex && fecha.getFullYear()===year){
         total+=monto;
      }
   }
 }
 return total;
}

function cargarDatos(mesIndex,year){
 query("INGRESOS",ingresosData=>{
  query("EGRESOS",egresosData=>{

   let ingresos=ingresosData?calcularPorMes(ingresosData,mesIndex,year):0;
   let egresos=egresosData?calcularPorMes(egresosData,mesIndex,year):0;
   let diferencia=ingresos-egresos;

   document.getElementById("ingresos").innerText=`C$ ${ingresos.toFixed(2)}`;
   document.getElementById("egresos").innerText=`C$ ${egresos.toFixed(2)}`;
   document.getElementById("diferencia").innerText=`C$ ${diferencia.toFixed(2)}`;

   const chartData=google.visualization.arrayToDataTable([
    ['Tipo','Monto'],
    ['Ingresos',ingresos],
    ['Egresos',egresos]
   ]);

   const chart=new google.visualization.ColumnChart(document.getElementById('chart_div'));
   chart.draw(chartData,{
      title:`Reporte Financiero - ${meses[mesIndex]} ${year}`,
      legend:{position:"none"}
   });
  });
 });
}

function iniciar(){
 const select=document.getElementById("mesSelector");
 const year=new Date().getFullYear();

 meses.forEach((mes,index)=>{
   let option=document.createElement("option");
   option.value=index;
   option.text=mes+" "+year;
   select.appendChild(option);
 });

 select.addEventListener("change",()=>{
   cargarDatos(parseInt(select.value),year);
 });

 const mesActual=new Date().getMonth();
 select.value=mesActual;
 cargarDatos(mesActual,year);
}

async function descargarPDF(){
 const { jsPDF } = window.jspdf;

 const reporte=document.getElementById("reportePDF");

 const canvas=await html2canvas(reporte,{scale:2});
 const imgData=canvas.toDataURL("image/png");

 const pdf=new jsPDF("p","mm","a4");

 pdf.setFontSize(16);
 pdf.text("Sindicato Juan Flores Vivas",105,15,{align:"center"});

 const ancho=190;
 const alto=(canvas.height*ancho)/canvas.width;

 pdf.addImage(imgData,"PNG",10,25,ancho,alto);

 const fecha=new Date().toLocaleDateString();
 pdf.setFontSize(9);
 pdf.text("Generado: "+fecha,10,290);

 pdf.save("Reporte_Sindicato.pdf");
}

google.charts.setOnLoadCallback(iniciar);
</script>

</body>
</html>
